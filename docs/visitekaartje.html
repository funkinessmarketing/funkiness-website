<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FUNkiness! Visitekaartje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Permanent+Marker&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #f21b7a;
      --black: #080403;
      --cream: #f7efe7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #b0b0b0;
      padding: 48px 40px;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 48px;
      align-items: center;
    }
    .label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
      border-radius: 3.5mm;
      box-shadow: 0 12px 48px rgba(0,0,0,0.3);
    }

    /* VOORKANT */
    .card-front {
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5mm 8mm 13mm;
    }
    .card-front .logo-img {
      width: 50mm;
      height: auto;
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }
    .card-front .service-line {
      font-family: 'Inter', sans-serif;
      font-size: 5pt;
      font-weight: 700;
      color: rgba(255,255,255,0.38);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }
    .card-front .tagline {
      font-family: 'Permanent Marker', cursive;
      color: var(--pink);
      font-size: 8.5pt;
      line-height: 1.2;
      position: relative;
      z-index: 2;
    }
    .card-front .names-line {
      font-family: 'Inter', sans-serif;
      font-size: 5.5pt;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 2.5mm;
      position: relative;
      z-index: 2;
      opacity: 0.65;
    }

    /* SVG panterprint wave onderaan voorkant */
    .panter-svg-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 14mm;
      z-index: 1;
    }

    /* ACHTERKANT */
    .card-back {
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 11mm 8mm 5mm;
      gap: 0;
    }

    /* SVG panterprint wave bovenaan achterkant */
    .panter-svg-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 12mm;
      z-index: 1;
    }

    .nfc-icon { margin-bottom: 2mm; position: relative; z-index: 2; }
    .tap-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 8.5pt;
      color: var(--black);
      margin-bottom: 0.8mm;
      position: relative;
      z-index: 2;
    }
    .tap-sub {
      font-family: 'Inter', sans-serif;
      font-size: 5.5pt;
      color: rgba(8,4,3,0.4);
      margin-bottom: 3.5mm;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .divider-line {
      width: 18mm;
      height: 1px;
      background: rgba(8,4,3,0.1);
      margin-bottom: 3.5mm;
      position: relative;
      z-index: 2;
    }
    .contact-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1mm;
      position: relative;
      z-index: 2;
    }
    .contact-row {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      color: rgba(8,4,3,0.55);
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }
    .contact-row strong { color: var(--black); font-weight: 700; }
    .pink-dot {
      width: 1.5mm;
      height: 1.5mm;
      background: var(--pink);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    @media print {
      body { background: white; padding: 10mm; }
      .label { display: none; }
      .card { box-shadow: none; border: 0.2mm solid #ddd; }
      @page { size: A4; margin: 10mm; }
    }
  </style>
</head>
<body>

  <div>
    <p class="label">Voorkant</p>
    <div class="card card-front">
      <img src="../funkiness-logo.png" alt="FUNkiness!" class="logo-img">
      <p class="service-line">AI, Social Media &amp; Marketing · Curaçao</p>
      <p class="tagline">Boring was never the plan.</p>
      <p class="names-line">Daisy &amp; Berdien</p>

      <!-- Panterprint met golvende bovenrand via SVG clipPath -->
      <svg class="panter-svg-bottom" viewBox="0 0 850 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="waveBottom">
            <path d="M0,38 C70,8 155,68 240,32 C325,-4 410,62 495,28 C580,-6 665,58 750,24 C800,8 830,22 850,16 L850,140 L0,140 Z"/>
          </clipPath>
        </defs>
        <image href="../panterprint.png" x="0" y="0" width="850" height="140"
               preserveAspectRatio="xMidYMid slice"
               clip-path="url(#waveBottom)"/>
      </svg>
    </div>
  </div>

  <div>
    <p class="label">Achterkant</p>
    <div class="card card-back">

      <!-- Panterprint met golvende onderrand bovenaan -->
      <svg class="panter-svg-top" viewBox="0 0 850 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="waveTop">
            <path d="M0,0 L850,0 L850,90 C780,120 695,60 610,96 C525,130 440,66 355,100 C270,132 185,68 100,102 C60,116 28,104 0,110 Z"/>
          </clipPath>
        </defs>
        <image href="../panterprint.png" x="0" y="0" width="850" height="120"
               preserveAspectRatio="xMidYMid slice"
               clip-path="url(#waveTop)"/>
      </svg>

      <svg class="nfc-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 12C20 16.418 16.418 20 12 20M16 12C16 14.209 14.209 16 12 16M20 12C20 7.582 16.418 4 12 4M16 12C16 9.791 14.209 8 12 8" stroke="#f21b7a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="1.5" fill="#f21b7a"/>
      </svg>

      <p class="tap-text">Tap to connect</p>
      <p class="tap-sub">Hold your phone to this card</p>
      <div class="divider-line"></div>
      <div class="contact-grid">
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span><strong>funkiness.ai</strong></span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>sayhello@funkiness.ai</span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>@funkiness.ai</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

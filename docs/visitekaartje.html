<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FUNkiness! Visitekaartje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Permanent+Marker&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #f21b7a;
      --black: #080403;
      --cream: #f7efe7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #b0b0b0;
      padding: 48px 40px;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 48px;
      align-items: center;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
      border-radius: 3.5mm;
      box-shadow: 0 12px 48px rgba(0,0,0,0.3);
    }

    /* ========================
       VOORKANT
    ======================== */
    .card-front {
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5mm 8mm 14mm;
    }

    .card-front .logo-img {
      width: 50mm;
      height: auto;
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }

    .card-front .service-line {
      font-family: 'Inter', sans-serif;
      font-size: 5pt;
      font-weight: 700;
      color: rgba(255,255,255,0.38);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }

    .card-front .tagline {
      font-family: 'Permanent Marker', cursive;
      color: var(--pink);
      font-size: 8.5pt;
      line-height: 1.2;
      position: relative;
      z-index: 2;
    }

    .card-front .names-line {
      font-family: 'Inter', sans-serif;
      font-size: 5.5pt;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 2.5mm;
      position: relative;
      z-index: 2;
      opacity: 0.65;
    }

    /* Panterprint strook onderaan */
    .panter-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 11mm;
      background-image: url('../panterprint.png');
      background-size: auto 100%;
      background-repeat: repeat-x;
      background-position: center;
      z-index: 1;
    }

    /* SVG golf over de panterprint strook — maakt de bovenrand golvend */
    .panter-wave {
      position: absolute;
      bottom: 8.5mm;
      left: 0;
      width: 100%;
      z-index: 2;
      line-height: 0;
    }

    .panter-wave svg {
      display: block;
      width: 100%;
      height: 6mm;
    }

    /* ========================
       ACHTERKANT
    ======================== */
    .card-back {
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10mm 8mm 6mm;
      gap: 0;
    }

    /* Panterprint golf bovenaan achterkant */
    .panter-wave-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
    }

    .panter-wave-top .strip-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8mm;
      background-image: url('../panterprint.png');
      background-size: auto 100%;
      background-repeat: repeat-x;
      background-position: center;
    }

    .panter-wave-top svg {
      display: block;
      width: 100%;
      height: 5mm;
      position: absolute;
      top: 6mm;
      left: 0;
    }

    .nfc-icon {
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }

    .tap-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 8.5pt;
      color: var(--black);
      letter-spacing: 0.5px;
      margin-bottom: 0.8mm;
      position: relative;
      z-index: 2;
    }

    .tap-sub {
      font-family: 'Inter', sans-serif;
      font-size: 5.5pt;
      color: rgba(8,4,3,0.4);
      margin-bottom: 3.5mm;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .divider-line {
      width: 18mm;
      height: 1px;
      background: rgba(8,4,3,0.1);
      margin-bottom: 3.5mm;
      position: relative;
      z-index: 2;
    }

    .contact-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1mm;
      position: relative;
      z-index: 2;
    }

    .contact-row {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      color: rgba(8,4,3,0.55);
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }

    .contact-row strong {
      color: var(--black);
      font-weight: 700;
    }

    .pink-dot {
      width: 1.5mm;
      height: 1.5mm;
      background: var(--pink);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    @media print {
      body { background: white; padding: 10mm; }
      .label { display: none; }
      .card { box-shadow: none; border: 0.2mm solid #ddd; }
      @page { size: A4; margin: 10mm; }
    }
  </style>
</head>
<body>

  <div>
    <p class="label">Voorkant</p>
    <div class="card card-front">
      <img src="../funkiness-logo.png" alt="FUNkiness!" class="logo-img">
      <p class="service-line">AI, Social Media &amp; Marketing · Curaçao</p>
      <p class="tagline">Boring was never the plan.</p>
      <p class="names-line">Daisy &amp; Berdien</p>

      <!-- Panterprint strook met golvende bovenrand -->
      <div class="panter-strip"></div>
      <div class="panter-wave">
        <svg viewBox="0 0 340 24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M0,12 C40,24 80,0 120,14 C160,28 200,4 240,16 C280,28 310,8 340,14 L340,24 L0,24 Z" fill="#080403"/>
        </svg>
      </div>
    </div>
  </div>

  <div>
    <p class="label">Achterkant</p>
    <div class="card card-back">

      <!-- Panterprint golf bovenaan -->
      <div class="panter-wave-top">
        <div class="strip-top"></div>
        <svg viewBox="0 0 340 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M0,8 C50,20 100,2 160,12 C220,22 280,4 340,10 L340,20 L0,20 Z" fill="#f7efe7"/>
        </svg>
      </div>

      <svg class="nfc-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 12C20 16.418 16.418 20 12 20M16 12C16 14.209 14.209 16 12 16M20 12C20 7.582 16.418 4 12 4M16 12C16 9.791 14.209 8 12 8" stroke="#f21b7a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="1.5" fill="#f21b7a"/>
      </svg>

      <p class="tap-text">Tap to connect</p>
      <p class="tap-sub">Hold your phone to this card</p>

      <div class="divider-line"></div>

      <div class="contact-grid">
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span><strong>funkiness.ai</strong></span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>sayhello@funkiness.ai</span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>@funkiness.ai</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FUNkiness! Visitekaartje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Permanent+Marker&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #f21b7a;
      --black: #080403;
      --cream: #f7efe7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #b0b0b0;
      padding: 48px 40px;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 48px;
      align-items: center;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
      border-radius: 3.5mm;
      box-shadow: 0 12px 48px rgba(0,0,0,0.3);
    }

    /* ========================
       VOORKANT
    ======================== */
    .card-front {
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 7mm 8mm 7mm 8mm;
    }

    .card-front .logo-img {
      width: 46mm;
      height: auto;
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }

    .card-front .service-line {
      font-family: 'Inter', sans-serif;
      font-size: 5.5pt;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3mm;
      position: relative;
      z-index: 2;
    }

    .card-front .tagline {
      font-family: 'Permanent Marker', cursive;
      color: var(--pink);
      font-size: 8.5pt;
      line-height: 1.2;
      position: relative;
      z-index: 2;
    }

    .card-front .names-line {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 3mm;
      position: relative;
      z-index: 2;
      opacity: 0.7;
    }

    /* Panterprint blob rechtsonder */
    .panter-blob-front {
      position: absolute;
      bottom: -8mm;
      right: -8mm;
      width: 38mm;
      height: 32mm;
      background-image: url('../panterprint.png');
      background-size: cover;
      background-position: center;
      border-radius: 62% 38% 46% 54% / 44% 58% 42% 56%;
      opacity: 0.55;
      z-index: 1;
    }

    /* Kleine roze accentblob */
    .pink-accent {
      position: absolute;
      top: -6mm;
      right: 14mm;
      width: 18mm;
      height: 14mm;
      background: var(--pink);
      border-radius: 50% 30% 60% 40% / 40% 60% 30% 55%;
      opacity: 0.18;
      z-index: 1;
    }

    /* ========================
       ACHTERKANT
    ======================== */
    .card-back {
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6mm 8mm 6mm;
      gap: 0;
    }

    /* Panterprint blob linksboven */
    .panter-blob-back {
      position: absolute;
      top: -6mm;
      left: -6mm;
      width: 30mm;
      height: 24mm;
      background-image: url('../panterprint.png');
      background-size: cover;
      background-position: center;
      border-radius: 40% 60% 55% 45% / 50% 40% 60% 50%;
      opacity: 0.45;
      z-index: 1;
    }

    /* Panterprint blob rechtsonder achterkant */
    .panter-blob-back-2 {
      position: absolute;
      bottom: -5mm;
      right: -5mm;
      width: 22mm;
      height: 18mm;
      background-image: url('../panterprint.png');
      background-size: cover;
      background-position: center;
      border-radius: 55% 45% 40% 60% / 45% 55% 40% 60%;
      opacity: 0.35;
      z-index: 1;
    }

    .nfc-icon {
      margin-bottom: 2mm;
      position: relative;
      z-index: 2;
    }

    .tap-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 8.5pt;
      color: var(--black);
      letter-spacing: 0.5px;
      margin-bottom: 0.8mm;
      position: relative;
      z-index: 2;
    }

    .tap-sub {
      font-family: 'Inter', sans-serif;
      font-size: 5.5pt;
      color: rgba(8,4,3,0.4);
      margin-bottom: 3.5mm;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .divider-line {
      width: 18mm;
      height: 1px;
      background: rgba(8,4,3,0.1);
      margin-bottom: 3.5mm;
      position: relative;
      z-index: 2;
    }

    .contact-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1mm;
      position: relative;
      z-index: 2;
    }

    .contact-row {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      color: rgba(8,4,3,0.55);
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }

    .contact-row strong {
      color: var(--black);
      font-weight: 700;
    }

    .pink-dot {
      width: 1.5mm;
      height: 1.5mm;
      background: var(--pink);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    @media print {
      body { background: white; padding: 10mm; }
      .label { display: none; }
      .card { box-shadow: none; border: 0.2mm solid #ddd; }
      @page { size: A4; margin: 10mm; }
    }
  </style>
</head>
<body>

  <div>
    <p class="label">Voorkant</p>
    <div class="card card-front">
      <div class="panter-blob-front"></div>
      <div class="pink-accent"></div>
      <img src="../funkiness-logo.png" alt="FUNkiness!" class="logo-img">
      <p class="service-line">AI, Social Media &amp; Marketing</p>
      <p class="tagline">Boring was never the plan.</p>
      <p class="names-line">Daisy &amp; Berdien · Curaçao</p>
    </div>
  </div>

  <div>
    <p class="label">Achterkant</p>
    <div class="card card-back">
      <div class="panter-blob-back"></div>
      <div class="panter-blob-back-2"></div>

      <svg class="nfc-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 12C20 16.418 16.418 20 12 20M16 12C16 14.209 14.209 16 12 16M20 12C20 7.582 16.418 4 12 4M16 12C16 9.791 14.209 8 12 8" stroke="#f21b7a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="1.5" fill="#f21b7a"/>
      </svg>

      <p class="tap-text">Tap to connect</p>
      <p class="tap-sub">Hold your phone to this card</p>

      <div class="divider-line"></div>

      <div class="contact-grid">
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span><strong>funkiness.ai</strong></span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>sayhello@funkiness.ai</span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>@funkiness.ai</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

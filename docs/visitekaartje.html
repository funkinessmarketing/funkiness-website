<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FUNkiness! Visitekaartje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Permanent+Marker&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #f21b7a;
      --black: #080403;
      --cream: #f7efe7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ccc;
      padding: 40px;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    .label {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ==============================
       KAART: 85mm x 55mm
       3mm bleed aan alle kanten
       Drukklaar: 91mm x 61mm
    ============================== */
    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
      border-radius: 3mm;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }

    /* VOORKANT */
    .card-front {
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 5mm 8mm 13mm;
    }

    .card-front .logo-img {
      width: 52mm;
      height: auto;
      margin-bottom: 3mm;
    }

    .card-front .tagline {
      font-family: 'Permanent Marker', cursive;
      color: var(--pink);
      font-size: 9pt;
      text-align: center;
      line-height: 1.2;
    }

    .card-front .names-line {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2.5mm;
    }

    .panter-strip-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 9mm;
      background-image: url('../panterprint.png');
      background-size: auto 100%;
      background-repeat: repeat-x;
    }

    .panter-strip-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5mm;
      background-image: url('../panterprint.png');
      background-size: auto 100%;
      background-repeat: repeat-x;
    }

    /* ACHTERKANT */
    .card-back {
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10mm 8mm 6mm;
      gap: 0;
    }

    .nfc-icon {
      margin-bottom: 2.5mm;
    }

    .tap-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 8.5pt;
      color: var(--black);
      letter-spacing: 0.5px;
      margin-bottom: 1mm;
    }

    .tap-sub {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      color: rgba(8,4,3,0.45);
      margin-bottom: 4mm;
      text-align: center;
    }

    .divider-line {
      width: 20mm;
      height: 1px;
      background: rgba(8,4,3,0.12);
      margin-bottom: 4mm;
    }

    .contact-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1mm;
    }

    .contact-row {
      font-family: 'Inter', sans-serif;
      font-size: 6pt;
      color: rgba(8,4,3,0.55);
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }

    .contact-row strong {
      color: var(--black);
      font-weight: 700;
    }

    .pink-dot {
      width: 1.5mm;
      height: 1.5mm;
      background: var(--pink);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    @media print {
      body {
        background: white;
        padding: 10mm;
      }
      .label { display: none; }
      .card {
        border-radius: 3mm;
        box-shadow: none;
        border: 0.2mm solid #ddd;
      }
      @page {
        size: A4;
        margin: 10mm;
      }
    }
  </style>
</head>
<body>

  <div>
    <p class="label">Voorkant</p>
    <div class="card card-front">
      <img src="../funkiness-logo.png" alt="FUNkiness!" class="logo-img">
      <p class="tagline">Boring was never the plan.</p>
      <p class="names-line">Daisy &amp; Berdien</p>
      <div class="panter-strip-bottom"></div>
    </div>
  </div>

  <div>
    <p class="label">Achterkant</p>
    <div class="card card-back">
      <div class="panter-strip-top"></div>

      <!-- NFC icon -->
      <svg class="nfc-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 12C20 16.418 16.418 20 12 20M16 12C16 14.209 14.209 16 12 16M20 12C20 7.582 16.418 4 12 4M16 12C16 9.791 14.209 8 12 8" stroke="#f21b7a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="1.5" fill="#f21b7a"/>
      </svg>

      <p class="tap-text">Tap to connect</p>
      <p class="tap-sub">Hold your phone to this card</p>

      <div class="divider-line"></div>

      <div class="contact-grid">
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span><strong>funkiness.ai</strong></span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>sayhello@funkiness.ai</span>
        </div>
        <div class="contact-row">
          <span class="pink-dot"></span>
          <span>@funkiness.ai</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
